<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Fire: Trivia Game</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>
    <button id="start"></button>
    <main id="game" class="hidden">
        <header>
            <h1 id="game-title">Quick Fire Trivia</h1>
            <div id="score-display">Score: <span id="score">0</span></div>
        </header>        
        <section id="question-card">
            <p id="question-number">Question 1 of 5</p>
            <h2 id="question-next">Who is the Knicks' all-time leading scorer?</h2>
            <ul id="answer-list">
                <li><button class="answer-btn">Patrick Ewing</button></li>
                <li><button class="answer-btn">Walt Fraizer</button></li>
                <li><button class="answer-btn">Carmelo Anthony</button></li>
                <li><button class="answer-btn">Barnard King</button></li>
            </ul>
        </section>
        <button id="next-btn" class="hidden">Next Question</button>
        <section id="end-screen" class="hidden"></section>
    </main>

    
</body>
</html>
